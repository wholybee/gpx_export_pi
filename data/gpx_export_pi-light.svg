<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>GPX Export</title>

  <!-- Document outline with folded corner -->
  <g stroke="#2b2b2b" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 6 8 L 6 58 L 38 58 L 38 16 L 30 8 Z" stroke-width="2.5"/>
    <path d="M 30 8 L 30 16 L 38 16" stroke-width="2.5"/>

    <!-- Route line connecting waypoints inside the document -->
    <polyline points="12,30 19,38 16,46 28,52" stroke-width="2"/>

    <!-- Export arrow -->
    <line x1="42" y1="33" x2="60" y2="33" stroke-width="3"/>
    <polyline points="52,25 60,33 52,41" stroke-width="3"/>
  </g>

  <!-- GPX label at top of document -->
  <text x="22" y="25" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#2b2b2b" text-anchor="middle">GPX</text>

  <!-- Waypoint markers -->
  <g fill="#2b2b2b">
    <circle cx="12" cy="30" r="2.3"/>
    <circle cx="19" cy="38" r="2.3"/>
    <circle cx="16" cy="46" r="2.3"/>
    <circle cx="28" cy="52" r="2.3"/>
  </g>
</svg>
